# Phase 2: retrieval over the personal corpus.
corpus_dir: data/corpus
persist_dir: data/.chroma
collection: life_corpus

splitter:
  chunk_tokens: 300
  chunk_overlap_tokens: 50
  # Markdown headers preserved into chunk metadata as heading_path.
  headers: [["#", "h1"], ["##", "h2"], ["###", "h3"]]

embeddings:
  model: BAAI/bge-small-en-v1.5
  device: cpu            # set cuda if available
  normalize: true

retriever:
  top_k: 6
  score_threshold: 0.3   # cosine similarity floor; below this a chunk is dropped
  rerank:
    enabled: false       # optional cross-encoder rerank
    model: BAAI/bge-reranker-base
    top_n: 4
